## 全般設定
# 256色端末を使用する
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
# キーストロークのディレイを減らす
set -sg escape-time 1
# マウス操作を有効にする
set -g mouse on

## キーバインディング
# prefixキーをC-bからC-xへ変更する
unbind C-b
set -g prefix C-x
# tmux内のプログラムにC-xを送る
bind C-x send-prefix
# ウィンドウを作成する
bind -n C-t new-window -c '#{pane_current_path}'
# ウィンドウを移動する
bind -n C-PageDown next-window
bind -n C-PageUp previous-window
# ペインを分割する
bind 2 split-window -v -c '#{pane_current_path}'
bind 3 split-window -h -c '#{pane_current_path}'
# ペインを移動する
bind -n C-o select-pane -t :.+
# コピーモード
setw -g mode-keys emacs
bind -n C-v copy-mode
bind-key -T copy-mode C-v send -X begin-selection
bind-key -T copy-mode C-w send -X copy-pipe-and-cancel "xsel -ib"
bind -n C-y run-shell 'tmux set-buffer -- "$(xsel -ob)" && tmux paste-buffer'

## ウィンドウ・ペイン設定
# ウィンドウのインデックスを1から始める
set -g base-index 1
# ウィンドウを閉じたときに番号を詰める
set -g renumber-windows on
# ペインのインデックスを1から始める
setw -g pane-base-index 1
# ヴィジュアルノーティフィケーションを有効にする
setw -g monitor-activity on
set -g visual-activity on

## 外観
# ウィンドウリストの色を設定する
setw -g window-status-activity-style bg="default","dim",fg="cyan"
# アクティブなウィンドウを目立たせる
setw -g window-status-current-style bg="blue","bright",fg="white"
# コマンドラインの色を設定する
set -g message-style bg="blue","bright",fg="white"

## ステータスバー
# ステータスバーの色を設定する
set -g status-style fg=white,bg=black
# 左パネルを設定する
set -g status-left-length 40
set -g status-left "#[fg=cyan]Session: #S #I #P"
# 右パネルを設定する
set -g status-right "#[fg=cyan][%Y-%m-%d(%a) %H:%M]"
# リフレッシュの間隔を設定する(デフォルト 15秒)
set -g status-interval 60
# ウィンドウリストの位置を中心寄せにする
set -g status-justify centre
